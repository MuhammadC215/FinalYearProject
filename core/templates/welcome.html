{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <title>Welcome</title>
</head>

<body>

    <!-- TOP NAV -->
    <nav class="navbar">
        <div class="logo">Combat Coach</div>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/profile/">Profile</a>
            <a href="/logout/">Logout</a>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="page-wrapper">

        <div class="dashboard-card">

            <h1>Welcome, {{ request.user.first_name }}</h1>

            <p style="margin-top:5px; color:#777;">
                Select an option to continue
            </p>

            <hr style="margin:15px 0; opacity:0.3;">

            <!-- BUTTON AREA -->
            <div style="
            display:flex;
            flex-direction:column;
            gap:12px;
            margin-top:10px;
        ">

                <a href="/profile/" style="
                    display:block;
                    padding:12px;
                    text-align:center;
                    border-radius:8px;
                    background:#f5c542;
                    color:black;
                    text-decoration:none;
                    font-weight:600;
               ">
                    View Profile
                </a>

                {% if profile.role == "Athlete" %}

                <a href="/dashboard/" style="
                        display:block;
                        padding:12px;
                        text-align:center;
                        border-radius:8px;
                        background:#4a90e2;
                        color:white;
                        text-decoration:none;
                        font-weight:600;
                   ">
                    Athlete Dashboard
                </a>

                <a href="{% url 'recommendations' %}" style="
                        display:block;
                        padding:12px;
                        text-align:center;
                        border-radius:8px;
                        background:#2ecc71;
                        color:white;
                        text-decoration:none;
                        font-weight:600;
                   ">
                    Matchmaking
                </a>

                {% endif %}

                {% if profile.role == "Coach" %}

                <a href="/coach-dashboard/" style="
                        display:block;
                        padding:12px;
                        text-align:center;
                        border-radius:8px;
                        background:#9b59b6;
                        color:white;
                        text-decoration:none;
                        font-weight:600;
                   ">
                    Coach Dashboard
                </a>

                {% endif %}

            </div>

        </div>

    </div>

</body>

</html>
